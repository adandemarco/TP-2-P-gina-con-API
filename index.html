<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectulibros — Descubrí tu próxima lectura</title>
    <meta name="description" content="Lectulibros: explorá miles de libros gratuitos por autor, género o colección. Descargá clásicos de la literatura universal.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <nav id="navegacion">
        <div id="logo">
            <i class="fa-solid fa-book-open-reader" id="logo-icon"></i>
            <h1>Lectulibros</h1>
        </div>

        <ul id="menu">
            <li><a href="#contenedor_principal" id="nav-libros"><i class="fa-solid fa-books"></i> Libros</a></li>
            <li>
                <button id="btn_ingresar" aria-label="Ingresar">
                    <i class="fa-solid fa-right-to-bracket"></i> Ingresar
                </button>
            </li>
            <li>
                <button id="btn_buscar" aria-label="Buscar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </li>
        </ul>
    </nav>

    <!-- Modal Ingresar -->
    <div id="modal_overlay" role="dialog" aria-modal="true" aria-labelledby="modal_titulo" hidden>
        <div id="modal_login">
            <button id="modal_cerrar" aria-label="Cerrar modal"><i class="fa-solid fa-xmark"></i></button>
            <div id="modal_header">
                <i class="fa-solid fa-book-open-reader" id="modal_icon"></i>
                <h2 id="modal_titulo">Accedé a tu cuenta</h2>
                <p>Demo visual — sin backend</p>
            </div>
            <form id="form_login" novalidate>
                <div class="campo">
                    <label for="login_email"><i class="fa-solid fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="login_email" placeholder="tu@email.com" autocomplete="email">
                </div>
                <div class="campo">
                    <label for="login_pass"><i class="fa-solid fa-lock"></i> Contraseña</label>
                    <input type="password" id="login_pass" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" id="btn_submit_login">
                    <i class="fa-solid fa-right-to-bracket"></i> Ingresar
                </button>
                <p id="login_aviso"><i class="fa-solid fa-circle-info"></i> Esta es una demo; los datos no se guardan.</p>
            </form>
        </div>
    </div>

    <section id="filtros">
        <div id="tabs">
            <button class="tab activo" data-filtro="autores">
                <i class="fa-solid fa-user-pen"></i> Autores
            </button>
            <button class="tab" data-filtro="generos">
                <i class="fa-solid fa-tags"></i> Géneros
            </button>
            <button class="tab" data-filtro="colecciones">
                <i class="fa-solid fa-layer-group"></i> Colecciones
            </button>
        </div>

        <div id="buscador">
            <input type="text" id="input_busqueda" placeholder="Buscar libro o autor...">
            <button id="btn_input_buscar">
                <i class="fa-solid fa-magnifying-glass"></i> Buscar
            </button>
        </div>

        <div id="abecedario">
            <button>A</button><button>B</button><button>C</button>
            <button>D</button><button>E</button><button>F</button>
            <button>G</button><button>H</button><button>I</button>
            <button>J</button><button>K</button><button>L</button>
            <button>M</button><button>N</button><button>O</button>
            <button>P</button><button>Q</button><button>R</button>
            <button>S</button><button>T</button><button>U</button>
            <button>V</button><button>W</button><button>X</button>
            <button>Y</button><button>Z</button>
        </div>

        <div id="lista_generos"></div>
    </section>

    <main id="contenedor_principal">
        <div id="titulo_novedades">
            <h2><i class="fa-solid fa-fire-flame-curved"></i> Las últimas novedades</h2>
        </div>

        <section id="contenedor_libros"></section>

        <div id="contenedor_boton">
            <button id="btn_cargar_mas">
                <i class="fa-solid fa-rotate-right"></i> Cargar más libros
            </button>
        </div>
    </main>

    <script src="./js/libros.js"></script>
</body>
</html>
