<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectulibros</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <nav id="navegacion">
        <div id="logo">
            <h1>Lectulibros</h1>
        </div>

        <!-- <ul id="menu">
            <li><a href="#">Libros</a></li>
            <li><a href="#">Ingresar</a></li>
            <li><button id="btn_buscar">🔍</button></li>
        </ul> -->
    </nav>

    <section id="filtros">
        <div id="tabs">
            <button class="tab activo" data-filtro="autores">Autores</button>
            <button class="tab" data-filtro="generos">Géneros</button>
            <button class="tab" data-filtro="series">Series</button>
        </div>

        <div id="buscador">
            <input type="text" id="input_busqueda" placeholder="Buscar libro o autor...">
            <button id="btn_input_buscar">Buscar</button>
        </div>

        <div id="abecedario">
            <button>A</button>
            <button>B</button>
            <button>C</button>
            <button>D</button>
            <button>E</button>
            <button>F</button>
            <button>G</button>
            <button>H</button>
            <button>I</button>
            <button>J</button>
            <button>K</button>
            <button>L</button>
            <button>M</button>
            <button>N</button>
            <button>O</button>
            <button>P</button>
            <button>Q</button>
            <button>R</button>
            <button>S</button>
            <button>T</button>
            <button>U</button>
            <button>V</button>
            <button>W</button>
            <button>X</button>
            <button>Y</button>
            <button>Z</button>
        </div>

        <div id="lista_generos"></div>
    </section>

    <main id="contenedor_principal">
        <div id="titulo_novedades">
            <h2>Las últimas novedades</h2>
        </div>

        <section id="contenedor_libros"></section>

        <div id="contenedor_boton">
            <button id="btn_cargar_mas">Cargar más libros</button>
        </div>
    </main>

    <script src="./js/libros.js"></script>
</body>
</html>
